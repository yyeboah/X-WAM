# t5
t5_model: umt5_xxl
t5_dtype: torch.bfloat16
text_len: 512
t5_checkpoint: models_t5_umt5-xxl-enc-bf16.pth
t5_tokenizer: google/umt5-xxl

# vae
vae_checkpoint: Wan2.2_VAE.pth
vae_stride: (4, 16, 16)

# model
num_extra_layers: 10

# dataset
dataset: robocasa
action_dim: 14
proprio_dim: 16

# training
wan_checkpoint_dir: ./checkpoints/wan22_5b/
pretrained_checkpoint: ./checkpoints/pretrained/checkpoints/last.ckpt
exp_root: ./experiments/
exp_name: debug

seed: 42
lr: 1e-5
weight_decay: 0.01
num_warmup_steps: 200
num_training_steps: 20000
log_interval: 20
save_interval: 5000
val_interval: 2500
limit_val_batches: 5
accumulate_grad_batches: 1
gradient_clip_val: 1.0
gradient_clip_algorithm: "norm"
batch_size_per_gpu: 4
num_workers_per_gpu: 8
prefetch_factor: 4
rf_distribution: "uniform" # choose from "uniform", "beta"
time_shifting: 5.0

action_loss_weight: 1.0
depth_loss_weight: 1.0
proprio_loss_weight: 1.0
dct_loss_weight: 0.0

# inference
flow_matching_num_train_timesteps: 1000
sample_fps: 5
sample_steps: 50
frame_num: 9
use_decoupled_inference: true
action_denoise_steps: 10

# ablation settings
use_depth: true
use_decoupled_sampling: true
use_joint_distribution: true
clean_action_ratio: 0.5

# cfg
text_dropout_prob: 0.1
cfg_list: [0, 2, 4]
